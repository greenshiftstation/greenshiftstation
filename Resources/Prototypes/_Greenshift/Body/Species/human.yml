- type: entity
  parent: BaseSpeciesAppearance
  id: GSAppearanceHuman
  categories: [ HideSpawnMenu ]
  name: human appearance
  components:
  - type: InitialBody
    organs:
      Torso: GSOrganHumanTorso
      Head: GSOrganHumanHead
      ArmLeft: GSOrganHumanArmLeft
      ArmRight: GSOrganHumanArmRight
      HandRight: GSOrganHumanHandRight
      HandLeft: GSOrganHumanHandLeft
      LegLeft: GSOrganHumanLegLeft
      LegRight: GSOrganHumanLegRight
      FootLeft: GSOrganHumanFootLeft
      FootRight: GSOrganHumanFootRight
      Brain: GSOrganHumanBrain
      Eyes: GSOrganHumanEyes
      Tongue: GSOrganHumanTongue
      Appendix: GSOrganHumanAppendix
      Ears: GSOrganHumanEars
      Lungs: GSOrganHumanLungs
      Heart: GSOrganHumanHeart
      Stomach: GSOrganHumanStomach
      Liver: GSOrganHumanLiver
      Kidneys: GSOrganHumanKidneys
  - type: HumanoidProfile
    species: GSHuman

- type: entity
  parent:
  - GSAppearanceHuman
  - BaseSpeciesMobOrganic
  id: GSMobHuman
  name: Urist McDeckhands
  suffix: GS
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5

- type: entity
  parent: OrganBase
  id: GSOrganHuman
  abstract: true
  suffix: human

- type: entity
  id: GSOrganHumanMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: GSOrganHuman
  id: GSOrganHumanInternal
