# Canes
# The white cane is intentionally not included here. Thats for the blind.
- type: loadout
  id: GSOffsetCane
  storage:
    back:
    - OffsetCane
  groupBy: "canes"

- type: loadout
  id: GSOffsetCaneWood
  storage:
    back:
    - OffsetCaneWood
  groupBy: "canes"

- type: loadout
  id: GSOffsetCaneClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: GSJobClown
      time: 3600 # 1hr
  storage:
    back:
    - OffsetCaneClown
  groupBy: "canes"

- type: loadout
  id: GSOffsetCaneMime
  effects:
