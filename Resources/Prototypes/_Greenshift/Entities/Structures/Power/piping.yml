- type: entity
  parent: CableBase
  id: GSPipeHP
  name: high-pressure power pipe
  description: An orange pipe containing extremely high-pressure steam.
  components:
  - type: Sprite
    sprite: _Greenshift/Structures/Power/Piping/hp_pipe.rsi
    state: hppipe_0
    drawdepth: ThickWire
  - type: Icon
    sprite: Structures/Power/Cables/hv_cable.rsi
    state: hvcable_4
  - type: NodeContainer
    nodes:
      power:
        !type:CableNode
        nodeGroupID: HVPower
  - type: Cable
    cableDroppedOnCutPrototype: GSPipeHPStack1
    cableType: HighVoltage
    cuttingQuality: Anchoring
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors: #excess damage (nuke?). avoid computational cost of spawning entities.
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          GSPipeHPStack1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: CableVisualizer
    statePrefix: hppipe_

- type: entity
  parent: CableBase
  id: GSPipeMP
  name: medium-pressure power pipe
  description: A medium-pressure power pipe.
  components:
  - type: Sprite
    sprite: _Greenshift/Structures/Power/Piping/mp_pipe.rsi
    layers:
    - state: mppipe_0
    - state: mpstripes_0
      shader: unshaded
  - type: Icon
    sprite: _Greenshift/Structures/Power/Piping/mp_pipe.rsi
    state: mppipe_4
  - type: NodeContainer
    nodes:
      power:
        !type:CableNode
        nodeGroupID: MVPower
  - type: Cable
    cableDroppedOnCutPrototype: GSPipeMPStack1
    cableType: MediumVoltage
    cuttingQuality: Anchoring
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors: #excess damage (nuke?). avoid computational cost of spawning entities.
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          GSPipeMPStack1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: CableVisualizer
    statePrefix: mppipe_
    extraLayerPrefix: mpstripes_
