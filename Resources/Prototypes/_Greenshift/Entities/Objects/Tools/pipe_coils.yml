#HP Stacks
- type: entity
  id: GSPipeHPStack
  parent: CableStack
  name: high-pressure power pipe
  suffix: Full
  description: High-pressure piping for connecting engines to heavy duty machinery, SMESes, and substations.
  components:
  - type: Stack
    stackType: GSPipeHP
    baseLayer: base
    layerStates:
    - coilhv-10
    - coilhv-20
    - coilhv-30
  - type: Sprite
    state: coilhv-30
    layers:
    - state: coilhv-30
      map: ["base"]
  - type: Item
    heldPrefix: coilhv
  - type: CablePlacer
    cablePrototypeID: GSPipeHP
    blockingWireType: HighVoltage
  - type: Appearance

- type: entity
  parent: GSPipeHPStack
  id: GSPipeHPStack10
  suffix: 10
  components:
  - type: Sprite
    state: coilhv-10
  - type: Stack
    count: 10

- type: entity
  parent: GSPipeHPStack
  id: GSPipeHPStack1
  suffix: 1
  components:
  - type: Sprite
    state: coilhv-10
  - type: Stack
    count: 1

